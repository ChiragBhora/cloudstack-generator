<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudStack Generator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <h1>CloudStack Generator</h1>
    <p>No-Code Azure DevOps & Terraform Generator</p>

    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <form id="multiStepForm">

        <!-- Step 1 -->
        <div class="step active">

            <h2>Project Details</h2>

            <label>Project Name</label>
            <input type="text" id="projectName">

            <label>Repository Name</label>
            <input type="text" id="repoName">

            <label>Repository Type</label>
            <select id="repoType">
                <option>GitHub</option>
                <option>Azure Repos</option>
                <option>GitLab</option>
            </select>

            <button type="button" class="nextBtn">
                Next
            </button>

        </div>

        <!-- Step 2 -->
        <div class="step">

            <h2>Deployment Category</h2>

            <label>Select Type</label>

            <select id="deploymentType">
                <option value="">Choose</option>
                <option value="application">
                    Application Deployment
                </option>
                <option value="infrastructure">
                    Infrastructure Deployment
                </option>
            </select>

            <div class="btn-group">
                <button type="button" class="prevBtn">
                    Previous
                </button>

                <button type="button" class="nextBtn">
                    Next
                </button>
            </div>

        </div>

    
        <!-- Step 3 -->
<div class="step">

    <h2>Configuration</h2>

    <div id="dynamicFields"></div>

    <h3 id="outputTitle">Generated Output</h3>

    <textarea
        id="terraformOutput"
        rows="12"
        readonly
        style="width:100%;margin-top:10px;"
    ></textarea>

    <button
        type="button"
        id="downloadBtn">
        Download Output
    </button>

    <div class="btn-group">

        <button type="button" class="prevBtn">
            Previous
        </button>

        <button type="submit">
            Generate Output
        </button>

    </div>

</div>
    </form>

</div>

<script src="js/form.js"></script>

</body>
</html>
