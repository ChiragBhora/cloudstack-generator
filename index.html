<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CloudStack Generator - Azure DevOps & Terraform Pipeline Generator">
    <meta name="author" content="CloudStack Generator">
    <title>CloudStack Generator | Azure DevOps & Terraform</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

<h1>☁️ CloudStack Generator</h1>

<p class="version">
    Enterprise Azure DevOps & Terraform Generator v1.0
</p>
    <p>
Generate Azure DevOps Pipelines and Terraform Infrastructure with Zero Coding
</p>

    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <form id="multiStepForm">

        <!-- STEP 1 -->
        <div class="step active">

            <h2>Project Details</h2>

            <label>Project Name</label>
            <input type="text" id="projectName">

            <label>Repository Name</label>
            <input type="text" id="repoName">
            <label>Repository URL</label>
            <input
            type="text"
            id="repoUrl"
            placeholder="https://github.com/user/project">

            <label>Repository Type</label>
            <select id="repoType">
                <option>GitHub</option>
                <option>Azure Repos</option>
                <option>GitLab</option>
            </select>
            <label>Project Description</label>
<textarea
    id="projectDescription"
    rows="3"
    placeholder="Short description of your project"></textarea>

<label>Pipeline Name</label>
<input
    type="text"
    id="pipelineName"
    placeholder="CloudStack-CI-CD">

<label>Pipeline Trigger</label>
<select id="pipelineTrigger">
    <option value="main">main</option>
    <option value="develop">develop</option>
    <option value="feature/*">feature/*</option>
</select>

            <button type="button" class="nextBtn">
                Next
            </button>

        </div>

        <!-- STEP 2 -->
        <div class="step">

            <h2>Deployment Category</h2>

            <label>Select Type</label>

            <select id="deploymentType">
                <option value="">Choose</option>

                <option value="application">
                    Application Deployment
                </option>

                <option value="infrastructure">
                    Infrastructure Deployment
                </option>

            </select>

            <div class="btn-group">

                <button type="button" class="prevBtn">
                    Previous
                </button>

                <button type="button" class="nextBtn">
                    Next
                </button>

            </div>

        </div>

        <!-- STEP 3 -->
        <div class="step">

            <h2>Configuration</h2>

            <div id="dynamicFields"></div>

            <div class="output-header">

    <h3 id="outputTitle">
        Generated Output
    </h3>

    <div class="toolbar">

        <button
            type="button"
            id="copyBtn"
            title="Copy Output">
            📋
        </button>

        <button
            type="button"
            id="downloadBtn"
            title="Download Output">
            ⬇
        </button>

    </div>

</div>

            <!-- Output Area -->
            <textarea
                id="terraformOutput"
                rows="14"
                readonly
                style="width:100%;margin-top:10px;"
            ></textarea>

            <div class="btn-group">

                <button
                    type="button"
                    class="prevBtn">
                    Previous
                </button>

                <button
                    type="submit">
                    Generate Output
                </button>

            </div>

        </div>

    </form>

</div>
<script src="js/devops.js"></script>
<script src="js/terraform.js"></script>
<script src="js/helpers.js"></script>
<script src="js/validator.js"></script>
<script src="js/download.js"></script>
<script src="js/ui.js"></script>
<script src="js/form.js"></script>
</body>
</html>
